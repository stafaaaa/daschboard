<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{
      --bg:#0f1012; --tile:rgba(30,31,35,.74); --tile2:rgba(26,27,31,.86);
      --border:rgba(255,255,255,.09); --text:#f3f4f6; --muted:#b8bdc7; --accent:#f2b869;
      --shadow:0 14px 40px rgba(0,0,0,.35); --radius:26px; --gap:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    body{
      background:
        radial-gradient(circle at top right, rgba(242,184,105,.08), transparent 25%),
        radial-gradient(circle at bottom left, rgba(101,163,255,.10), transparent 22%),
        var(--bg);
      overflow:hidden;
    }
    .app{display:flex;flex-direction:column;height:100vh;padding:14px;gap:12px}
    .toolbar{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:22px;padding:10px 12px;box-shadow:var(--shadow);backdrop-filter: blur(18px);
    }
    .brand{font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:12px;color:var(--muted);margin-right:8px}
    .spacer{flex:1}
    button,.file-label,input,textarea{font:inherit}
    .btn,.file-label{
      appearance:none;border:none;border-radius:999px;padding:10px 14px;color:var(--text);
      background:rgba(255,255,255,.08);border:1px solid var(--border);cursor:pointer
    }
    .btn.primary{background:var(--accent);color:#111;font-weight:700}
    .file-label input{display:none}
    .workspace{flex:1;min-height:0;overflow:auto;border-radius:28px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:86px;gap:var(--gap);min-height:100%}
    .tile{
      position:relative;background:linear-gradient(180deg,var(--tile),var(--tile2));border:1px solid var(--border);
      box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden;backdrop-filter:blur(18px);user-select:none;min-height:120px
    }
    .tile.dragging{opacity:.45}.tile.drop-target{outline:2px dashed rgba(255,255,255,.45);outline-offset:-8px}
    .tile-inner{height:100%;padding:18px;display:flex;flex-direction:column;gap:10px}
    .tile-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
    .tile-tools{display:none;gap:8px}.edit-mode .tile-tools{display:flex}
    .icon-btn{width:30px;height:30px;border-radius:999px;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
    .clock-time{font-size:clamp(42px,4vw,76px);font-weight:700;line-height:1;margin-top:auto}
    .clock-date{font-size:clamp(15px,1.5vw,24px);color:var(--muted)}
    .weather-temp{font-size:clamp(44px,4vw,78px);font-weight:700;line-height:1}
    .weather-city{font-size:clamp(22px,2vw,34px);font-weight:700}
    .muted{color:var(--muted)}
    .calendar-month{font-size:clamp(20px,1.8vw,30px);font-weight:700}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center;font-size:13px}
    .dow{color:var(--muted);padding-bottom:4px}
    .day{padding:8px 0;border-radius:14px;background:rgba(255,255,255,.03)}
    .day.empty{background:transparent}.day.today{background:var(--accent);color:#111;font-weight:700}
    .slideshow-tile{position:relative;flex:1;min-height:0;border-radius:20px;overflow:hidden;background:#1a1a1a;border:1px solid rgba(255,255,255,.08)}
    .slideshow-tile img{width:100%;height:100%;object-fit:cover;display:block}
    .slide-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:24px}
    .slidestrip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:90px;overflow:hidden}
    .slidestrip img{width:100%;height:80px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
    .agenda,.recipes{display:flex;flex-direction:column;gap:10px;overflow:auto;min-height:0}
    .agenda-item,.recipe{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);padding:12px 14px;border-radius:16px}
    .agenda-item strong,.recipe strong{display:block;margin-bottom:4px}
    iframe{width:100%;height:100%;border:none;border-radius:18px;background:rgba(0,0,0,.2)}
    .settings{
      position:fixed;left:14px;right:14px;bottom:14px;background:rgba(18,19,22,.96);border:1px solid var(--border);
      border-radius:28px;padding:16px;box-shadow:var(--shadow);display:none;z-index:40;max-height:72vh;overflow:auto
    }
    .settings.open{display:block}
    .settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .settings label{display:flex;flex-direction:column;gap:8px;color:var(--muted);font-size:14px}
    .settings input,.settings textarea{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:12px;resize:vertical;min-height:46px}
    @media (max-width:1100px){.grid{grid-template-columns:repeat(6,1fr)}.settings-grid{grid-template-columns:1fr}}
    @media (max-width:700px){.grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:120px}}
  </style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="brand">Home Dashboard</div>
    <button class="btn" id="editBtn">Bearbeiten</button>
    <label class="file-label">Bilder hochladen <input id="imageInput" type="file" accept="image/*" multiple></label>
    <button class="btn" id="settingsBtn">Einstellungen</button>
    <button class="btn" id="addTileBtn">+ Kachel</button>
    <div class="spacer"></div>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
  <div class="workspace"><div class="grid" id="grid"></div></div>
</div>

<div class="settings" id="settingsPanel">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <strong style="font-size:18px">Einstellungen</strong>
    <div class="spacer"></div>
    <button class="btn" id="closeSettings">Schließen</button>
  </div>
  <div class="settings-grid">
    <label>Stadt<input id="cityInput" placeholder="z. B. Hannover"></label>
    <label>Slideshow Sekunden<input id="slideSecondsInput" type="number" min="3" max="300"></label>
    <label>Spotify Embed URL<input id="spotifyInput" placeholder="https://open.spotify.com/embed/..."></label>
    <label>YouTube Embed URL<input id="youtubeInput" placeholder="https://www.youtube.com/embed/..."></label>
    <label>Termine (eine Zeile pro Termin: 2026-04-06 18:00 | Titel)<textarea id="eventsInput" rows="6"></textarea></label>
    <label>Rezepte (eine Zeile pro Rezept: Titel | Zeit | Zutaten)<textarea id="recipesInput" rows="6"></textarea></label>
  </div>
  <div style="display:flex;gap:10px;margin-top:14px">
    <button class="btn primary" id="saveSettingsBtn">Speichern</button>
  </div>
</div>

<script>
const STORAGE_KEY = "dashboard-home-v2";
const defaultState = {
  city:"Hannover",
  coords:{lat:52.3759, lon:9.7320},
  slideSeconds:10,
  spotifyUrl:"https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6?utm_source=generator",
  youtubeUrl:"https://www.youtube.com/embed/jfKfPfyJRdk",
  photos:[],
  events:["2026-04-06 18:00 | Abendessen","2026-04-07 09:00 | Einkauf","2026-04-08 15:00 | Termin"],
  recipes:["Pasta | 20 Min | Nudeln, Tomaten, Knoblauch","Omelett | 10 Min | Eier, Salz, Pfeffer","Salat | 8 Min | Gurke, Tomate, Feta"],
  layout:[
    {id:"clock",type:"clock",w:4,h:2,title:"Uhr"},
    {id:"weather",type:"weather",w:4,h:2,title:"Wetter"},
    {id:"calendar",type:"calendar",w:4,h:3,title:"Kalender"},
    {id:"slideshow",type:"slideshow",w:4,h:3,title:"Slideshow"},
    {id:"agenda",type:"agenda",w:4,h:3,title:"Termine"},
    {id:"spotify",type:"spotify",w:4,h:3,title:"Spotify"},
    {id:"youtube",type:"youtube",w:4,h:3,title:"YouTube"},
    {id:"recipes",type:"recipes",w:4,h:3,title:"Rezepte"}
  ]
};
function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return deepCopy(defaultState);
    return Object.assign(deepCopy(defaultState), JSON.parse(raw));
  }catch(e){ return deepCopy(defaultState); }
}
let state = loadState();
const grid = document.getElementById("grid");
const settingsPanel = document.getElementById("settingsPanel");
let slideshowIndex = 0;
let slideTimer = null;
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function textToEmbedYoutube(v){
  v=(v||"").trim(); if(!v) return defaultState.youtubeUrl;
  if(v.includes("/embed/")) return v;
  let m=v.match(/[?&]v=([^&]+)/)||v.match(/youtu\.be\/([^?&]+)/);
  if(m&&m[1]) return "https://www.youtube.com/embed/"+m[1];
  return v;
}
function textToEmbedSpotify(v){
  v=(v||"").trim(); if(!v) return defaultState.spotifyUrl;
  if(v.includes("/embed/")) return v;
  return v.replace("open.spotify.com/","open.spotify.com/embed/");
}
function cycleTileSize(item){
  const sizes=[{w:4,h:2},{w:4,h:3},{w:6,h:3},{w:6,h:4}];
  const idx=sizes.findIndex(s=>s.w===item.w&&s.h===item.h);
  const next=sizes[(idx+1)%sizes.length];
  item.w=next.w; item.h=next.h;
}
function formatEvent(line){
  const parts=(line||"").split("|").map(s=>s.trim());
  return '<div class="agenda-item"><strong>'+(parts[1]||parts[0]||"Termin")+'</strong><div class="muted">'+(parts[0]||"")+'</div></div>';
}
function formatRecipe(line){
  const p=(line||"").split("|").map(s=>s.trim());
  return '<div class="recipe"><strong>'+(p[0]||"Rezept")+'</strong><div class="muted">'+(p[1]||"")+'</div><div>'+(p[2]||"")+'</div></div>';
}
function createCalendarHTML(){
  const now=new Date(), year=now.getFullYear(), month=now.getMonth();
  const first=new Date(year, month, 1), lastDate=new Date(year, month+1, 0).getDate();
  const startDay=(first.getDay()+6)%7;
  const monthTitle=now.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  let html='<div class="calendar-month">'+monthTitle+'</div><div class="calendar-grid">';
  ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(d=>html+='<div class="dow">'+d+'</div>');
  for(let i=0;i<startDay;i++) html+='<div class="day empty"></div>';
  for(let d=1;d<=lastDate;d++) html+='<div class="day '+(d===now.getDate()?"today":"")+'">'+d+'</div>';
  html+='</div>'; return html;
}
function weatherCodeLabel(code){
  const map={0:"Klar",1:"Überwiegend klar",2:"Teilweise bewölkt",3:"Bewölkt",45:"Nebel",48:"Raureifnebel",51:"Leichter Nieselregen",53:"Nieselregen",55:"Starker Nieselregen",61:"Leichter Regen",63:"Regen",65:"Starker Regen",71:"Leichter Schnee",73:"Schnee",75:"Starker Schneefall",80:"Regenschauer",81:"Starke Schauer",82:"Sehr starke Schauer",95:"Gewitter",96:"Gewitter mit Hagel",99:"Starkes Gewitter"};
  return map[code]||"Aktuell";
}
async function loadWeather(){
  const tempEl=document.getElementById("weatherTemp"), cityEl=document.getElementById("weatherCity"), descEl=document.getElementById("weatherDesc"), metaEl=document.getElementById("weatherMeta");
  if(!tempEl||!cityEl||!descEl||!metaEl) return;
  cityEl.textContent=state.city;
  try{
    const lat=state.coords.lat, lon=state.coords.lon;
    const url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto';
    const res=await fetch(url); const data=await res.json();
    tempEl.textContent=Math.round(data.current.temperature_2m)+'°';
    descEl.textContent=weatherCodeLabel(data.current.weather_code);
    metaEl.textContent='Gefühlt '+Math.round(data.current.apparent_temperature)+'° · Wind '+Math.round(data.current.wind_speed_10m)+' km/h';
  }catch(e){
    tempEl.textContent='--°'; descEl.textContent='Wetter konnte nicht geladen werden'; metaEl.textContent='';
  }
}
async function geocodeCity(city){
  try{
    const res=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=de&format=json');
    const data=await res.json();
    if(data&&data.results&&data.results[0]){
      const r=data.results[0];
      state.coords={lat:r.latitude, lon:r.longitude};
      state.city=r.name; saveState();
    }
  }catch(e){}
}
function updateClock(){
  const t=document.getElementById("clockTime"), d=document.getElementById("clockDate");
  if(!t||!d) return;
  const now=new Date();
  t.textContent=now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
  d.textContent=now.toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(updateClock,1000);
function renderTileBody(item, body){
  if(item.type==="clock"){ body.innerHTML='<div class="clock-time" id="clockTime">--:--</div><div class="clock-date" id="clockDate">--</div>'; return; }
  if(item.type==="weather"){ body.innerHTML='<div class="weather-city" id="weatherCity">'+state.city+'</div><div class="weather-temp" id="weatherTemp">--°</div><div class="muted" id="weatherDesc">Lade Wetter...</div><div class="muted" id="weatherMeta"></div>'; loadWeather(); return; }
  if(item.type==="calendar"){ body.innerHTML=createCalendarHTML(); return; }
  if(item.type==="slideshow"){
    const current=state.photos.length ? state.photos[slideshowIndex % state.photos.length] : null;
    body.innerHTML='<div class="slideshow-tile">'+(current ? '<img id="slideImage" src="'+current+'" alt="Slideshow">' : '<div class="slide-empty">Noch keine Bilder hochgeladen</div>')+'</div><div class="slidestrip">'+(state.photos||[]).slice(0,3).map(src=>'<img src="'+src+'" alt="">').join("")+'</div>';
    return;
  }
  if(item.type==="agenda"){ body.innerHTML=state.events.length ? '<div class="agenda">'+state.events.map(formatEvent).join("")+'</div>' : '<div class="muted">Keine Termine eingetragen</div>'; return; }
  if(item.type==="spotify"){ body.innerHTML='<iframe src="'+state.spotifyUrl+'" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>'; return; }
  if(item.type==="youtube"){ body.innerHTML='<iframe src="'+state.youtubeUrl+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>'; return; }
  if(item.type==="recipes"){ body.innerHTML=state.recipes.length ? '<div class="recipes">'+state.recipes.map(formatRecipe).join("")+'</div>' : '<div class="muted">Keine Rezepte eingetragen</div>'; return; }
  body.innerHTML='<div class="muted">Leere Kachel</div>';
}
function bindDrag(tile){
  tile.addEventListener("dragstart",e=>{ tile.classList.add("dragging"); e.dataTransfer.setData("text/plain", tile.dataset.id); });
  tile.addEventListener("dragend",()=>tile.classList.remove("dragging"));
  tile.addEventListener("dragover",e=>{ if(!document.body.classList.contains("edit-mode")) return; e.preventDefault(); tile.classList.add("drop-target"); });
  tile.addEventListener("dragleave",()=>tile.classList.remove("drop-target"));
  tile.addEventListener("drop",e=>{
    if(!document.body.classList.contains("edit-mode")) return;
    e.preventDefault(); tile.classList.remove("drop-target");
    const fromId=e.dataTransfer.getData("text/plain"), toId=tile.dataset.id;
    if(!fromId||fromId===toId) return;
    const fromIndex=state.layout.findIndex(t=>t.id===fromId), toIndex=state.layout.findIndex(t=>t.id===toId);
    const moved=state.layout.splice(fromIndex,1)[0];
    state.layout.splice(toIndex,0,moved);
    saveState(); render();
  });
}
function render(){
  grid.innerHTML="";
  state.layout.forEach(item=>{
    const tile=document.createElement("div");
    tile.className="tile"; tile.draggable=true; tile.dataset.id=item.id;
    tile.style.gridColumn='span '+item.w; tile.style.gridRow='span '+item.h;
    tile.innerHTML='<div class="tile-inner"><div class="tile-header"><div class="label">'+(item.title||item.type)+'</div><div class="tile-tools"><button class="icon-btn resize-btn" title="Größe ändern">⤢</button><button class="icon-btn delete-btn" title="Löschen">×</button></div></div><div class="tile-body" style="display:flex;flex-direction:column;gap:10px;min-height:0;flex:1"></div></div>';
    renderTileBody(item, tile.querySelector(".tile-body"));
    tile.querySelector(".resize-btn").addEventListener("click",e=>{ e.stopPropagation(); cycleTileSize(item); saveState(); render(); });
    tile.querySelector(".delete-btn").addEventListener("click",e=>{ e.stopPropagation(); state.layout=state.layout.filter(t=>t.id!==item.id); saveState(); render(); });
    bindDrag(tile);
    grid.appendChild(tile);
  });
  updateClock();
}
function startSlideshow(){
  if(slideTimer) clearInterval(slideTimer);
  slideTimer=setInterval(()=>{
    if(!state.photos.length) return;
    slideshowIndex=(slideshowIndex+1)%state.photos.length;
    const img=document.getElementById("slideImage");
    if(img) img.src=state.photos[slideshowIndex];
  }, Math.max(3, Number(state.slideSeconds||10))*1000);
}
function readFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
document.getElementById("editBtn").addEventListener("click",()=>document.body.classList.toggle("edit-mode"));
document.getElementById("settingsBtn").addEventListener("click",()=>{
  document.getElementById("cityInput").value=state.city||"";
  document.getElementById("slideSecondsInput").value=state.slideSeconds||10;
  document.getElementById("spotifyInput").value=state.spotifyUrl||"";
  document.getElementById("youtubeInput").value=state.youtubeUrl||"";
  document.getElementById("eventsInput").value=(state.events||[]).join("\n");
  document.getElementById("recipesInput").value=(state.recipes||[]).join("\n");
  settingsPanel.classList.add("open");
});
document.getElementById("closeSettings").addEventListener("click",()=>settingsPanel.classList.remove("open"));
document.getElementById("saveSettingsBtn").addEventListener("click", async ()=>{
  const newCity=document.getElementById("cityInput").value.trim();
  state.slideSeconds=Math.max(3, Number(document.getElementById("slideSecondsInput").value||10));
  state.spotifyUrl=textToEmbedSpotify(document.getElementById("spotifyInput").value.trim());
  state.youtubeUrl=textToEmbedYoutube(document.getElementById("youtubeInput").value.trim());
  state.events=document.getElementById("eventsInput").value.split("\n").map(s=>s.trim()).filter(Boolean);
  state.recipes=document.getElementById("recipesInput").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(newCity && newCity!==state.city){ state.city=newCity; await geocodeCity(newCity); }
  saveState(); settingsPanel.classList.remove("open"); render(); startSlideshow();
});
document.getElementById("resetBtn").addEventListener("click",()=>{ localStorage.removeItem(STORAGE_KEY); location.reload(); });
document.getElementById("imageInput").addEventListener("change", async e=>{
  const files=Array.from(e.target.files||[]);
  for(const file of files){ state.photos.push(await readFile(file)); }
  saveState(); render(); startSlideshow();
});
document.getElementById("addTileBtn").addEventListener("click",()=>{
  const options=[{type:"clock",title:"Uhr"},{type:"weather",title:"Wetter"},{type:"calendar",title:"Kalender"},{type:"slideshow",title:"Slideshow"},{type:"agenda",title:"Termine"},{type:"spotify",title:"Spotify"},{type:"youtube",title:"YouTube"},{type:"recipes",title:"Rezepte"}];
  const next=options[state.layout.length % options.length];
  state.layout.push({id:next.type+"-"+Date.now(), type:next.type, title:next.title, w:4, h:3});
  saveState(); render();
});
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{})); }
render(); startSlideshow();
</script>
</body>
</html>
