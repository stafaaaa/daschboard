<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Tablet Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #0071e3;
  --bg: #000000;
  --tile-bg: rgba(40,40,42,0.8);
  --text: #f5f5f7;
  --text-dim: rgba(245,245,247,0.5);
  --border: rgba(255,255,255,0.1);
  --radius: 26px;
  --gap: 12px;
  --nav-h: 72px;
}

html, body {
  width: 100%; height: 100%;
  background: #000;
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#app {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg);
  transition: background 0.7s;
}

/* GRID */
#grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: var(--gap);
  padding: 14px 14px 6px;
  overflow: hidden;
}

/* TILE */
.tile {
  background: var(--tile-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
}
.tile:active { transform: scale(0.98); }

.tile-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600;
  opacity: 0.55; margin-bottom: 8px;
  flex-shrink: 0;
}
.tile-header svg { width:14px; height:14px; }
.tile-body { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }

/* GLOW EFFECTS */
.glow-pulse { border-color: var(--gc, #0071e3); animation: glowPulse 3s infinite; }
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 8px var(--gc, #0071e3); }
  50%      { box-shadow: 0 0 24px var(--gc, #0071e3); }
}
.glow-static { border-color: var(--gc); box-shadow: 0 0 12px var(--gc); }
.glow-rainbow { animation: glowRainbow 5s linear infinite; border-width: 2px; }
@keyframes glowRainbow {
  0%   { border-color:#f00; box-shadow:0 0 14px #f00; }
  33%  { border-color:#0f0; box-shadow:0 0 14px #0f0; }
  66%  { border-color:#00f; box-shadow:0 0 14px #00f; }
  100% { border-color:#f00; box-shadow:0 0 14px #f00; }
}

/* CLOCK */
.clock-time {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 1;
  text-align: center;
}
.clock-date {
  font-size: clamp(0.7rem, 1.5vw, 1rem);
  opacity: 0.5;
  text-align: center;
  margin-top: 6px;
}

/* WEATHER */
.weather-main { display:flex; align-items:center; gap:12px; }
.weather-temp { font-size: clamp(2rem,5vw,3.5rem); font-weight:300; }
.weather-city { font-size:clamp(0.8rem,1.5vw,1.1rem); font-weight:600; }
.weather-hl   { font-size:0.75rem; opacity:0.5; }
.weather-forecast {
  display:flex; gap:6px; margin-top:10px;
  overflow-x:auto; padding-bottom:2px;
}
.weather-day {
  display:flex; flex-direction:column; align-items:center;
  background:rgba(255,255,255,0.05); border-radius:14px;
  padding:6px 8px; min-width:44px; flex-shrink:0;
}
.weather-day .wd  { font-size:9px; opacity:0.5; }
.weather-day .we  { font-size:1.2rem; margin:2px 0; }
.weather-day .wt  { font-size:11px; font-weight:600; }

/* CALENDAR */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.cal-nav span { font-size:12px; font-weight:600; }
.cal-nav button {
  background:none; border:none; color:var(--text);
  opacity:0.6; cursor:pointer; padding:2px 6px;
  font-size:16px; border-radius:8px;
}
.cal-nav button:hover { background:rgba(255,255,255,0.1); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; flex:1; }
.cal-dh { font-size:9px; text-align:center; opacity:0.35; font-weight:700; padding:2px 0; }
.cal-d  {
  display:flex; align-items:center; justify-content:center;
  font-size:11px; border-radius:8px; aspect-ratio:1;
  transition:background 0.15s;
}
.cal-d.today { background:var(--accent); color:#fff; font-weight:700; box-shadow:0 0 10px rgba(0,113,227,0.4); }
.cal-d.other { opacity:0; pointer-events:none; }

/* APPOINTMENTS */
.appt-item {
  background:rgba(255,255,255,0.05);
  border-radius:12px; padding:7px 10px;
  font-size:12px; margin-bottom:5px;
  border-left:3px solid var(--accent);
}
.appt-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.3; font-size:12px; gap:6px; }

/* SLIDESHOW */
.slideshow-wrap { position:absolute; inset:0; border-radius:inherit; overflow:hidden; }
.slideshow-img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; transition:opacity 1.5s ease; }
.slideshow-dots { position:absolute; bottom:8px; right:8px; display:flex; gap:4px; z-index:2; }
.slideshow-dot { width:6px; height:6px; border-radius:3px; background:rgba(255,255,255,0.4); transition:all 0.3s; }
.slideshow-dot.active { width:14px; background:#fff; }
.slideshow-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.3; gap:8px; font-size:12px; }

/* APP TILE */
.app-tile { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; }
.app-icon { padding:14px; background:rgba(255,255,255,0.05); border-radius:20px; border:1px solid rgba(255,255,255,0.1); }
.app-btn {
  padding:8px 20px;
  background:var(--accent);
  color:#fff; border:none; border-radius:20px;
  font-size:12px; font-weight:600; cursor:pointer;
  transition:opacity 0.2s;
}
.app-btn:hover { opacity:0.85; }

/* NOTE */
.note-area {
  width:100%; height:100%;
  background:none; border:none; outline:none;
  color:var(--text); font-family:inherit;
  font-size:12px; line-height:1.6;
  resize:none;
}
.note-area::placeholder { opacity:0.3; }

/* NAV */
#nav {
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: center;
  padding: 0 16px 8px;
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  z-index: 50;
}
#nav.hidden { transform: translateY(100%); opacity:0; pointer-events:none; }
.nav-inner {
  display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:100px;
  padding:6px 12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.nav-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:100px;
  background:none; border:none;
  color:var(--text); font-family:inherit;
  font-size:12px; font-weight:600;
  cursor:pointer; opacity:0.4;
  transition:all 0.2s;
}
.nav-btn.active { background:rgba(255,255,255,0.1); opacity:1; }
.nav-btn:hover  { opacity:1; }
.nav-btn svg    { width:18px; height:18px; }
.nav-divider    { width:1px; height:22px; background:rgba(255,255,255,0.1); margin:0 4px; }
.nav-icon-btn {
  padding:8px; border-radius:100px;
  background:none; border:none;
  color:var(--text); cursor:pointer;
  opacity:0.5; transition:all 0.2s;
}
.nav-icon-btn:hover { opacity:1; background:rgba(255,255,255,0.1); }
.nav-icon-btn svg { width:18px; height:18px; display:block; }
.nav-icon-btn.edit-active { background:var(--accent); opacity:1; color:#fff; }

/* SETTINGS MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; transition:opacity 0.3s;
}
.modal-overlay.show { opacity:1; }
.modal-box {
  background:#1c1c1e;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:36px;
  padding:28px;
  width:100%; max-width:600px;
  max-height:85vh; overflow-y:auto;
  transform:scale(0.92) translateY(20px);
  transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.show .modal-box { transform:scale(1) translateY(0); }
.modal-title { font-size:20px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.modal-close { margin-left:auto; background:none; border:none; color:var(--text); cursor:pointer; opacity:0.5; padding:4px; border-radius:8px; }
.modal-close:hover { opacity:1; background:rgba(255,255,255,0.1); }
.modal-section { margin-bottom:20px; }
.modal-section-title { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; opacity:0.35; margin-bottom:12px; }
.field-label { font-size:11px; font-weight:600; opacity:0.5; margin-bottom:6px; display:block; }
.field-input {
  width:100%; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px; padding:10px 14px;
  color:var(--text); font-family:inherit; font-size:13px;
  outline:none; transition:border-color 0.2s;
}
.field-input:focus { border-color:var(--accent); }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.theme-btn {
  padding:10px 6px; border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:var(--text); font-family:inherit;
  font-size:11px; font-weight:700; cursor:pointer;
  transition:all 0.2s;
}
.theme-btn.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 16px rgba(0,113,227,0.35); }
.url-row { display:flex; gap:8px; margin-bottom:8px; }
.url-row .field-input { flex:1; }
.add-btn {
  padding:10px 16px; background:var(--accent); border:none;
  border-radius:14px; color:#fff; font-weight:700; cursor:pointer;
  font-size:16px; transition:opacity 0.2s;
}
.add-btn:hover { opacity:0.85; }
.url-thumb-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-height:160px; overflow-y:auto; }
.url-thumb {
  aspect-ratio:16/9; border-radius:10px; overflow:hidden;
  position:relative; border:1px solid rgba(255,255,255,0.1);
}
.url-thumb img { width:100%; height:100%; object-fit:cover; }
.url-thumb-del {
  position:absolute; inset:0;
  background:rgba(200,0,0,0.6);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.2s; border:none; cursor:pointer; color:#fff;
}
.url-thumb:hover .url-thumb-del { opacity:1; }
.save-btn {
  width:100%; padding:14px;
  background:var(--accent); border:none; border-radius:18px;
  color:#fff; font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; margin-top:20px; transition:opacity 0.2s;
}
.save-btn:hover { opacity:0.85; }
.cancel-btn {
  width:100%; padding:14px;
  background:rgba(255,255,255,0.05); border:none; border-radius:18px;
  color:var(--text); font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; margin-top:8px; transition:background 0.2s;
}
.cancel-btn:hover { background:rgba(255,255,255,0.1); }

/* TOGGLE */
.toggle-row { display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.05); border-radius:14px; padding:12px 14px; }
.toggle-info { font-size:13px; font-weight:600; }
.toggle-sub  { font-size:10px; opacity:0.4; margin-top:2px; }
.toggle-btn  { width:46px; height:26px; border-radius:13px; background:#3a3a3c; border:none; cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; }
.toggle-btn.on { background:var(--accent); }
.toggle-thumb { position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left 0.2s; }
.toggle-btn.on .toggle-thumb { left:23px; }

/* FILE UPLOAD */
.file-upload-area {
  border:2px dashed rgba(255,255,255,0.2); border-radius:14px;
  padding:16px; text-align:center; cursor:pointer;
  font-size:12px; opacity:0.5; transition:all 0.2s;
}
.file-upload-area:hover { opacity:1; border-color:var(--accent); }

/* PHOTO THUMBS */
.photo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px; max-height:100px; overflow-y:auto; }
.photo-thumb { aspect-ratio:1; border-radius:8px; overflow:hidden; position:relative; }
.photo-thumb img { width:100%; height:100%; object-fit:cover; }
.photo-del { position:absolute; inset:0; background:rgba(200,0,0,0.6); display:flex; align-items:center; justify-content:center; opacity:0; transition:0.2s; border:none; cursor:pointer; color:#fff; }
.photo-thumb:hover .photo-del { opacity:1; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:2px; }

/* NOTHING THEME */
body.theme-nothing { font-family:'Courier New', monospace; }
body.theme-nothing .tile { border-radius:4px; }
body.theme-nothing .nav-inner { border-radius:8px; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.tile { animation: fadeIn 0.4s ease both; }
</style>
</head>
<body>

<div id="app">
  <div id="grid"></div>
  <nav id="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-view="home" onclick="switchView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Home
      </button>
      <button class="nav-btn" data-view="media" onclick="switchView('media')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
        Media
      </button>
      <button class="nav-btn" data-view="tools" onclick="switchView('tools')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Tools
      </button>
      <div class="nav-divider"></div>
      <button class="nav-icon-btn" id="editBtn" onclick="toggleEdit()" title="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="nav-icon-btn" onclick="toggleFullscreen()" title="Vollbild">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="nav-icon-btn" onclick="openSettings()" title="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </nav>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
      <button class="modal-close" onclick="closeSettings()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Themes</div>
      <div class="theme-grid">
        <button class="theme-btn" data-theme="apple-dark" onclick="applyTheme('apple-dark')">Apple Dark</button>
        <button class="theme-btn" data-theme="apple-light" onclick="applyTheme('apple-light')">Apple Light</button>
        <button class="theme-btn" data-theme="xiaomi" onclick="applyTheme('xiaomi')">Xiaomi</button>
        <button class="theme-btn" data-theme="nothing" onclick="applyTheme('nothing')">Nothing</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Allgemein</div>
      <div class="field-grid">
        <div>
          <label class="field-label">Stadt für Wetter</label>
          <input type="text" class="field-input" id="cfg-city" placeholder="Düsseldorf">
        </div>
        <div>
          <label class="field-label">Thema</label>
          <select class="field-input" id="cfg-theme">
            <option value="dark">Dunkel</option>
            <option value="light">Hell</option>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Slideshow Quellen</div>

      <div style="margin-bottom:12px;">
        <label class="field-label">Fotos vom Tablet wählen</label>
        <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
          📁 Tippen um Fotos auszuwählen
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleLocalFiles(event)">
        <div class="photo-grid" id="localPhotoGrid"></div>
      </div>

      <div style="margin-bottom:12px;">
        <label class="field-label">Online Bild URLs</label>
        <div class="url-row">
          <input type="text" class="field-input" id="newImageUrl" placeholder="https://...">
          <button class="add-btn" onclick="addImageUrl()">+</button>
        </div>
        <div class="url-thumb-grid" id="urlThumbGrid"></div>
      </div>

      <div>
        <label class="field-label">Wechsel-Intervall (Sekunden)</label>
        <input type="number" class="field-input" id="cfg-interval" min="1" value="6" style="width:120px">
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Apps & Links</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label class="field-label">Spotify URL</label>
          <input type="text" class="field-input" id="cfg-spotify" placeholder="spotify:">
        </div>
        <div>
          <label class="field-label">YouTube URL</label>
          <input type="text" class="field-input" id="cfg-youtube" placeholder="vnd.youtube://">
        </div>
        <div>
          <label class="field-label">Amazon Music URL</label>
          <input type="text" class="field-input" id="cfg-amazon" placeholder="amazonmusic://">
        </div>
        <div>
          <label class="field-label">Termine (Eine Zeile pro Termin)</label>
          <textarea class="field-input" id="cfg-appointments" rows="4" placeholder="10:00 Meeting&#10;14:00 Termin"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Design</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-info">Kiosk Modus</div>
          <div class="toggle-sub">Nav automatisch ausblenden</div>
        </div>
        <button class="toggle-btn" id="kioskToggle" onclick="toggleKiosk()">
          <div class="toggle-thumb"></div>
        </button>
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">Speichern</button>
    <button class="cancel-btn" onclick="closeSettings()">Abbrechen</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const DEFAULT_CONFIG = {
  city: 'Düsseldorf',
  interval: 6,
  spotify: 'spotify:',
  youtube: 'vnd.youtube://',
  amazon: 'amazonmusic://',
  appointments: '',
  theme: 'dark',
  layoutTheme: 'apple-dark',
  bg: '#000000',
  accent: '#0071e3',
  tileOpacity: 0.8,
  isKioskMode: false,
  onlineUrls: [
    'https://picsum.photos/seed/a1/1200/800',
    'https://picsum.photos/seed/a2/1200/800',
    'https://picsum.photos/seed/a3/1200/800'
  ],
  localPhotoData: [] // base64
};

const DEFAULT_TILES = [
  { id:'1', type:'clock',        title:'Uhrzeit',      col:2, row:2, view:'home',  glow:'pulse',  gc:'#0071e3' },
  { id:'2', type:'weather',      title:'Wetter',       col:2, row:2, view:'home',  glow:'pulse',  gc:'#0071e3' },
  { id:'3', type:'calendar',     title:'Kalender',     col:2, row:2, view:'home',  glow:'static', gc:'#af52de' },
  { id:'4', type:'appointments', title:'Termine',      col:2, row:2, view:'home',  glow:'static', gc:'#ff9f0a' },
  { id:'5', type:'slideshow',    title:'Slideshow',    col:4, row:2, view:'home',  glow:'none',   gc:'' },
  { id:'6', type:'spotify',      title:'Spotify',      col:2, row:1, view:'media', glow:'pulse',  gc:'#28cd41' },
  { id:'7', type:'youtube',      title:'YouTube',      col:2, row:1, view:'media', glow:'pulse',  gc:'#ff0000' },
  { id:'8', type:'amazonmusic',  title:'Amazon Music', col:2, row:1, view:'media', glow:'pulse',  gc:'#00a8e1' },
];

let cfg   = Object.assign({...DEFAULT_CONFIG}, JSON.parse(localStorage.getItem('td_cfg') || 'null') || {});
let tiles = JSON.parse(localStorage.getItem('td_tiles')|| 'null') || DEFAULT_TILES.map(t=>({...t}));
let activeView = 'home';
let editMode   = false;
let navTimer   = null;

// ============================================================
// SAVE / LOAD
// ============================================================
function save() {
  localStorage.setItem('td_cfg',   JSON.stringify(cfg));
  localStorage.setItem('td_tiles', JSON.stringify(tiles));
}

// ============================================================
// THEMES
// ============================================================
const THEMES = {
  'apple-dark':  { bg:'#000000', accent:'#0071e3', tileOpacity:0.75 },
  'apple-light': { bg:'#f5f5f7', accent:'#0071e3', tileOpacity:0.85 },
  'xiaomi':      { bg:'#1a1a1a', accent:'#ff6700', tileOpacity:0.9  },
  'nothing':     { bg:'#000000', accent:'#ff0000', tileOpacity:0.1  }
};

function applyTheme(id) {
  const t = THEMES[id]; if(!t) return;
  cfg.layoutTheme = id;
  cfg.bg    = t.bg;
  cfg.accent = t.accent;
  cfg.tileOpacity = t.tileOpacity;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === id));
  applyCSS();
}

function applyCSS() {
  const root = document.documentElement;
  root.style.setProperty('--accent', cfg.accent);
  root.style.setProperty('--bg', cfg.bg);
  root.style.setProperty('--tile-bg', hexToRgba(cfg.bg === '#f5f5f7' ? '#ffffff' : '#28282a', cfg.tileOpacity));
  document.body.className = cfg.layoutTheme === 'nothing' ? 'theme-nothing' : '';
  document.getElementById('app').style.backgroundColor = cfg.bg;
  document.getElementById('app').style.color = cfg.bg === '#f5f5f7' ? '#1d1d1f' : '#f5f5f7';
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const viewTiles = tiles.filter(t => t.view === activeView);
  viewTiles.forEach((tile, i) => {
    const el = createTile(tile, i);
    grid.appendChild(el);
  });
  applyCSS();
  updateNavBtns();
}

function createTile(tile, i) {
  const div = document.createElement('div');
  div.className = 'tile';
  div.dataset.id = tile.id;
  div.style.gridColumn = `span ${tile.col}`;
  div.style.gridRow    = `span ${tile.row}`;
  div.style.animationDelay = `${i * 0.05}s`;

  if (tile.glow && tile.glow !== 'none') {
    div.classList.add(`glow-${tile.glow}`);
    if (tile.gc) div.style.setProperty('--gc', tile.gc);
  }

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'tile-header';
  hdr.innerHTML = `${getTileIcon(tile.type)}<span>${tile.title}</span>`;
  if (editMode) {
    const del = document.createElement('button');
    del.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    del.style.cssText = 'margin-left:auto;background:rgba(255,50,50,0.2);border:none;color:#ff4444;border-radius:6px;padding:3px 6px;cursor:pointer;';
    del.onclick = () => { tiles = tiles.filter(t=>t.id!==tile.id); save(); render(); };
    hdr.appendChild(del);
  }
  div.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'tile-body';
  renderTileBody(tile, body);
  div.appendChild(body);

  return div;
}

function renderTileBody(tile, body) {
  switch(tile.type) {
    case 'clock':        body.appendChild(createClock());        break;
    case 'weather':      body.appendChild(createWeather());      break;
    case 'calendar':     body.appendChild(createCalendar());     break;
    case 'appointments': body.appendChild(createAppointments()); break;
    case 'slideshow':    createSlideshow(body);                  break;
    case 'note':         body.appendChild(createNote(tile));     break;
    default:             body.appendChild(createAppTile(tile));  break;
  }
}

// ============================================================
// CLOCK
// ============================================================
function createClock() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;';
  const t = document.createElement('div'); t.className = 'clock-time'; t.id = 'clockTime';
  const d = document.createElement('div'); d.className = 'clock-date'; d.id = 'clockDate';
  wrap.appendChild(t); wrap.appendChild(d);
  updateClock();
  return wrap;
}

function updateClock() {
  const el = document.getElementById('clockTime');
  const de = document.getElementById('clockDate');
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  de.textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
  setTimeout(updateClock, 1000);
}

// ============================================================
// WEATHER
// ============================================================
let weatherCache = null;

function createWeather() {
  const wrap = document.createElement('div');
  wrap.id = 'weatherWrap';
  wrap.style.cssText = 'display:flex;flex-direction:column;height:100%;justify-content:space-between;';
  wrap.innerHTML = '<div style="opacity:0.4;font-size:12px;text-align:center;margin:auto;">Lade Wetter...</div>';
  fetchWeather(wrap);
  return wrap;
}

async function fetchWeather(wrap) {
  try {
    const city = cfg.city || 'Düsseldorf';
    if (weatherCache && weatherCache.city === city) { renderWeather(wrap, weatherCache.data); return; }
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=de&format=json`).then(r=>r.json());
    if (!geo.results?.length) return;
    const {latitude, longitude, name} = geo.results[0];
    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json());
    w.cityName = name;
    weatherCache = {city, data:w};
    renderWeather(wrap, w);
  } catch(e) {
    if(wrap) wrap.innerHTML = '<div style="opacity:0.3;font-size:11px;text-align:center;margin:auto;">Wetter nicht verfügbar</div>';
  }
}

function renderWeather(wrap, w) {
  if (!wrap) return;
  const emojis = w.daily.time.slice(1,6).map((_,i)=>weatherEmoji(w.daily.weather_code[i+1]));
  const forecast = w.daily.time.slice(1,6).map((t,i) => `
    <div class="weather-day">
      <div class="wd">${new Date(t).toLocaleDateString('de-DE',{weekday:'short'})}</div>
      <div class="we">${emojis[i]}</div>
      <div class="wt">${Math.round(w.daily.temperature_2m_max[i+1])}°</div>
    </div>`).join('');
  wrap.innerHTML = `
    <div class="weather-main">
      <div class="weather-temp">${Math.round(w.current.temperature_2m)}°</div>
      <div>
        <div class="weather-city">${w.cityName}</div>
        <div class="weather-hl">H:${Math.round(w.daily.temperature_2m_max[0])}° L:${Math.round(w.daily.temperature_2m_min[0])}°</div>
      </div>
    </div>
    <div class="weather-forecast">${forecast}</div>`;
}

function weatherEmoji(c) {
  if(c===0) return '☀️';
  if(c<=3)  return '⛅';
  if(c<=48) return '🌫️';
  if(c<=67) return '🌧️';
  if(c<=77) return '❄️';
  if(c<=82) return '🌦️';
  return '⛈️';
}

// ============================================================
// CALENDAR
// ============================================================
let calViewDate = new Date();

function createCalendar() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;height:100%;';
  wrap.id = 'calWrap';
  renderCalendar(wrap);
  return wrap;
}

function renderCalendar(wrap) {
  if (!wrap) return;
  const today = new Date();
  const y = calViewDate.getFullYear(), m = calViewDate.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstDay = new Date(y, m, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const monthStr = calViewDate.toLocaleDateString('de-DE', {month:'long', year:'numeric'});

  let cells = '';
  for(let i=0;i<42;i++) {
    const day = i - offset + 1;
    if(day<1||day>daysInMonth) { cells+=`<div class="cal-d other"></div>`; continue; }
    const isToday = day===today.getDate() && m===today.getMonth() && y===today.getFullYear();
    cells += `<div class="cal-d ${isToday?'today':''}">${day}</div>`;
  }

  wrap.innerHTML = `
    <div class="cal-nav">
      <button onclick="changeCalMonth(-1)">‹</button>
      <span>${monthStr}</span>
      <button onclick="changeCalMonth(1)">›</button>
    </div>
    <div class="cal-grid" style="flex:1;">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      ${cells}
    </div>`;
}

function changeCalMonth(offset) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + offset, 1);
  renderCalendar(document.getElementById('calWrap'));
}

// ============================================================
// APPOINTMENTS
// ============================================================
function createAppointments() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;height:100%;overflow-y:auto;';
  const items = (cfg.appointments||'').split('\n').filter(l=>l.trim()).slice(0,6);
  if(items.length===0) {
    wrap.innerHTML = `<div class="appt-empty"><span style="font-size:24px">📅</span><span>Keine Termine</span><span style="font-size:10px;opacity:0.5">In Einstellungen hinzufügen</span></div>`;
  } else {
    wrap.innerHTML = items.map(a=>`<div class="appt-item">${a}</div>`).join('');
  }
  return wrap;
}

// ============================================================
// SLIDESHOW
// ============================================================
function getAllPhotos() {
  return [...(cfg.onlineUrls||[]), ...(cfg.localPhotoData||[])];
}

function createSlideshow(body) {
  const photos = getAllPhotos();
  const tile = body.closest ? body : body;

  if(photos.length===0) {
    body.innerHTML = `<div class="slideshow-empty"><span style="font-size:32px">🖼️</span><span>Keine Bilder</span><span>In Einstellungen hinzufügen</span></div>`;
    return;
  }

  let idx = 0;
  const wrap = document.createElement('div'); wrap.className = 'slideshow-wrap';
  const img  = document.createElement('img');  img.className = 'slideshow-img';
  img.referrerPolicy = 'no-referrer';
  img.src = photos[0];

  const dots = document.createElement('div'); dots.className = 'slideshow-dots';
  photos.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'slideshow-dot' + (i===0?' active':'');
    dots.appendChild(d);
  });

  wrap.appendChild(img); wrap.appendChild(dots);
  body.innerHTML = ''; body.style.position='relative';
  body.appendChild(wrap);

  if(photos.length>1) {
    setInterval(() => {
      img.style.opacity='0';
      setTimeout(()=>{
        idx = (idx+1)%photos.length;
        img.src = photos[idx];
        img.style.opacity='1';
        dots.querySelectorAll('.slideshow-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
      }, 800);
    }, (cfg.interval||6)*1000);
  }
}

// ============================================================
// NOTE
// ============================================================
function createNote(tile) {
  const ta = document.createElement('textarea');
  ta.className = 'note-area';
  ta.placeholder = 'Notiz schreiben...';
  ta.value = tile.content || '';
  ta.addEventListener('input', () => {
    const t = tiles.find(t=>t.id===tile.id);
    if(t) { t.content = ta.value; save(); }
  });
  return ta;
}

// ============================================================
// APP TILE
// ============================================================
function createAppTile(tile) {
  const wrap = document.createElement('div'); wrap.className = 'app-tile';
  const icon = document.createElement('div'); icon.className = 'app-icon';
  icon.innerHTML = getTileIcon(tile.type, 28);
  const btn = document.createElement('button'); btn.className = 'app-btn';
  btn.textContent = 'Öffnen';
  let url = '';
  if(tile.type==='spotify')     url = cfg.spotify;
  if(tile.type==='youtube')     url = cfg.youtube;
  if(tile.type==='amazonmusic') url = cfg.amazon;
  if(tile.type==='recipe')      url = 'https://www.chefkoch.de/';
  btn.onclick = () => { if(url) window.open(url,'_blank'); };
  wrap.appendChild(icon); wrap.appendChild(btn);
  return wrap;
}

// ============================================================
// ICONS
// ============================================================
function getTileIcon(type, size=14) {
  const s = `width="${size}" height="${size}"`;
  const icons = {
    clock:        `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    weather:      `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
    calendar:     `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    appointments: `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    slideshow:    `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    spotify:      `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    youtube:      `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.97C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96C1 8.12 1 12 1 12s0 3.88.46 5.58a2.78 2.78 0 0 0 1.95 1.97C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.97C23 15.88 23 12 23 12s0-3.88-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>`,
    amazonmusic:  `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    note:         `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  };
  return icons[type] || `<svg ${s} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`;
}

// ============================================================
// NAVIGATION
// ============================================================
function switchView(v) {
  activeView = v;
  render();
}

function updateNavBtns() {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === activeView);
  });
  const eb = document.getElementById('editBtn');
  if(eb) eb.classList.toggle('edit-active', editMode);
}

function toggleEdit() {
  editMode = !editMode;
  render();
}

function toggleFullscreen() {
  if(!document.fullscreenElement) {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

// ============================================================
// KIOSK MODE
// ============================================================
function setupKiosk() {
  if(navTimer) clearTimeout(navTimer);
  const nav = document.getElementById('nav');
  if(!cfg.isKioskMode) { nav.classList.remove('hidden'); return; }

  const reset = () => {
    nav.classList.remove('hidden');
    if(navTimer) clearTimeout(navTimer);
    if(!editMode) navTimer = setTimeout(() => nav.classList.add('hidden'), 5000);
  };
  document.addEventListener('touchstart', reset);
  document.addEventListener('mousemove', reset);
  reset();
}

// ============================================================
// SETTINGS
// ============================================================
function openSettings() {
  const m = document.getElementById('settingsModal');
  // Fill fields
  document.getElementById('cfg-city').value        = cfg.city||'Düsseldorf';
  document.getElementById('cfg-theme').value       = cfg.theme||'dark';
  document.getElementById('cfg-interval').value    = cfg.interval||6;
  document.getElementById('cfg-spotify').value     = cfg.spotify||'spotify:';
  document.getElementById('cfg-youtube').value     = cfg.youtube||'vnd.youtube://';
  document.getElementById('cfg-amazon').value      = cfg.amazon||'amazonmusic://';
  document.getElementById('cfg-appointments').value = cfg.appointments||'';

  const kt = document.getElementById('kioskToggle');
  kt.classList.toggle('on', cfg.isKioskMode);

  // Theme buttons
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === cfg.layoutTheme));

  // URL thumbs
  renderUrlThumbs();
  renderLocalPhotos();

  m.style.display='flex';
  requestAnimationFrame(()=>m.classList.add('show'));
}

function closeSettings() {
  const m = document.getElementById('settingsModal');
  m.classList.remove('show');
  setTimeout(()=>m.style.display='none', 300);
}

function saveSettings() {
  cfg.city         = document.getElementById('cfg-city').value.trim() || 'Düsseldorf';
  cfg.theme        = document.getElementById('cfg-theme').value;
  cfg.interval     = parseInt(document.getElementById('cfg-interval').value)||6;
  cfg.spotify      = document.getElementById('cfg-spotify').value;
  cfg.youtube      = document.getElementById('cfg-youtube').value;
  cfg.amazon       = document.getElementById('cfg-amazon').value;
  cfg.appointments = document.getElementById('cfg-appointments').value;
  weatherCache = null; // reset so weather reloads
  save();
  closeSettings();
  render();
  setupKiosk();
}

function toggleKiosk() {
  cfg.isKioskMode = !cfg.isKioskMode;
  document.getElementById('kioskToggle').classList.toggle('on', cfg.isKioskMode);
}

// ============================================================
// IMAGE MANAGEMENT
// ============================================================
function addImageUrl() {
  const inp = document.getElementById('newImageUrl');
  const url = inp.value.trim();
  if(url && !cfg.onlineUrls.includes(url)) {
    cfg.onlineUrls.push(url);
    inp.value = '';
    renderUrlThumbs();
  }
}

function renderUrlThumbs() {
  const grid = document.getElementById('urlThumbGrid');
  if(!grid) return;
  grid.innerHTML = '';
  (cfg.onlineUrls||[]).forEach((url,i) => {
    const div = document.createElement('div'); div.className='url-thumb';
    const img = document.createElement('img'); img.src=url; img.referrerPolicy='no-referrer';
    const btn = document.createElement('button'); btn.className='url-thumb-del';
    btn.innerHTML='🗑'; btn.onclick=()=>{ cfg.onlineUrls.splice(i,1); renderUrlThumbs(); };
    div.appendChild(img); div.appendChild(btn);
    grid.appendChild(div);
  });
}

function handleLocalFiles(e) {
  const files = Array.from(e.target.files||[]);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      cfg.localPhotoData = cfg.localPhotoData||[];
      cfg.localPhotoData.push(ev.target.result);
      renderLocalPhotos();
    };
    reader.readAsDataURL(file);
  });
}

function renderLocalPhotos() {
  const grid = document.getElementById('localPhotoGrid');
  if(!grid) return;
  grid.innerHTML = '';
  (cfg.localPhotoData||[]).forEach((data,i) => {
    const div = document.createElement('div'); div.className='photo-thumb';
    const img = document.createElement('img'); img.src=data;
    const btn = document.createElement('button'); btn.className='photo-del';
    btn.innerHTML='🗑'; btn.onclick=()=>{ cfg.localPhotoData.splice(i,1); renderLocalPhotos(); };
    div.appendChild(img); div.appendChild(btn);
    grid.appendChild(div);
  });
}

// Enter key for URL input - moved inside DOMContentLoaded below

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('newImageUrl').addEventListener('keydown', e => { if(e.key==='Enter') addImageUrl(); });
  try {
    applyCSS();
    render();
    setupKiosk();
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('grid').innerHTML = '<div style="color:red;padding:20px;">Fehler: ' + e.message + '</div>';
  }
  if('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(()=>{});
    document.addEventListener('visibilitychange', () => {
      if(document.visibilityState==='visible') navigator.wakeLock.request('screen').catch(()=>{});
    });
  }
});
</script>
